name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
      - '[0-9]+.[0-9]+.[0-9]+*'

jobs:
  tests:
    name: Tests
    uses: ./.github/workflows/tests.yml

  publish:
    name: Publish to Packagist
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - name: Notify Packagist
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
        run: |
          if [ -z "$PACKAGIST_USERNAME" ] || [ -z "$PACKAGIST_API_TOKEN" ]; then
            echo "::error::PACKAGIST_USERNAME and/or PACKAGIST_API_TOKEN secrets are not set."
            exit 1
          fi
          status=$(curl -s -o response.json -w '%{http_code}' \
            -X POST "https://packagist.org/api/update-package?username=${PACKAGIST_USERNAME}&apiToken=${PACKAGIST_API_TOKEN}" \
            -H 'Content-Type: application/json' \
            -d '{"repository":{"url":"https://packagist.org/packages/combat-ui/core-bundle"}}')
          cat response.json
          if [ "$status" -ne 202 ]; then
            echo "::error::Packagist update failed with HTTP $status"
            exit 1
          fi
